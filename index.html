    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Agentic Agency?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Agentic Agency is a software engineering firm based in Copenhagen, Denmark that deploys autonomous AI agents (primarily Claude) to build production-grade software. We deliver working systems to production—not prototypes, not demos—using our ADAPT methodology (Agentic Development with Artifact Persistence & Testing)."
          }
        },
        {
          "@type": "Question",
          "name": "How do AI agents differ from traditional software development?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI agents work autonomously within defined constraints. Humans set goals and review at critical gates—they don't micromanage every line of code. Our ADAPT methodology includes Proceed, Flag, and Hard Stop states so agents can escalate transparently. Nothing ships without human review at designated checkpoints."
          }
        },
        {
          "@type": "Question",
          "name": "What is the ADAPT methodology?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ADAPT stands for Agentic Development with Artifact Persistence & Testing. It's our proprietary framework where: A = Agents work autonomously on defined tasks, D = Development is production-grade from day one, A = Artifacts (decisions/context) persist across sessions, P = Persistence ensures continuity, T = Testing gates every task (no task closes with failing tests)."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a typical project take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Average delivery is 8 weeks from kickoff to production. Recent examples: Purchase-to-pay automation (17 screens, 3 AI agents) delivered in 8 weeks. Workforce scheduling platform delivered in 6 weeks. Personal AI assistant with 45 use cases delivered in 12 weeks."
          }
        },
        {
          "@type": "Question",
          "name": "What does Agentic Agency cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer fixed-price engagements based on scope, not hours. Typical range: €50,000–€500,000 depending on complexity. No retainers, no hourly rates. You pay for delivered, working software. If our agents can't deliver efficiently, that's our problem—not yours."
          }
        },
        {
          "@type": "Question",
          "name": "What technologies does Agentic Agency use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our AI backbone is Claude (Anthropic). We use a custom ADAPT framework for orchestration, Kafka for event streaming, React/Next.js/Tailwind for frontend, Node.js/Python/PostgreSQL for backend, and Vercel/Railway/AWS for infrastructure."
          }
        }
      ]
    }
    </script>
